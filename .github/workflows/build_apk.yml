name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Set up Java (required for Android build)
      # ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─────────────────────────────────────────
      # 3. Set up Flutter
      # ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────
      # 4. Check Flutter version
      # ─────────────────────────────────────────
      - name: Flutter version
        run: flutter --version

      # ─────────────────────────────────────────
      # 5. Install dependencies
      # ─────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────────────────
      # 6. Run tests (optional — won't fail if none)
      # ─────────────────────────────────────────
      - name: Run tests
        run: flutter test --no-pub
        continue-on-error: true

      # ─────────────────────────────────────────
      # 7. Analyze code
      # ─────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-pub
        continue-on-error: true

      # ─────────────────────────────────────────
      # 8. Build APK (release)
      # ─────────────────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --no-pub

      # ─────────────────────────────────────────
      # 9. Build APK (split per ABI — smaller files)
      # ─────────────────────────────────────────
      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release --no-pub

      # ─────────────────────────────────────────
      # 10. Rename APKs with timestamp
      # ─────────────────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p output
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp build/app/outputs/flutter-apk/app-release.apk \
             output/ChessMaster_${TIMESTAMP}_universal.apk
          
          # Split APKs (arm64-v8a is most common modern device)
          if [ -f build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
               output/ChessMaster_${TIMESTAMP}_arm64.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
               output/ChessMaster_${TIMESTAMP}_arm32.apk
          fi
          if [ -f build/app/outputs/flutter-apk/app-x86_64-release.apk ]; then
            cp build/app/outputs/flutter-apk/app-x86_64-release.apk \
               output/ChessMaster_${TIMESTAMP}_x86_64.apk
          fi
          
          echo "=== Built APKs ==="
          ls -lh output/

      # ─────────────────────────────────────────
      # 11. Upload APKs as GitHub Artifacts
      # ─────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChessMaster-APKs
          path: output/*.apk
          retention-days: 30

      # ─────────────────────────────────────────
      # 12. Create Release (only on push to main)
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chess Master v${{ github.run_number }}
          body: |
            ## ♟ Chess Master - Auto Build

            Built from commit: `${{ github.sha }}`
            Branch: `${{ github.ref_name }}`
            
            ### 📱 Download Options
            - **Universal APK** — works on all devices (larger file)
            - **arm64** — modern Android phones (recommended)
            - **arm32** — older Android phones
            - **x86_64** — Android emulators
            
            ### Installation
            1. Download the APK for your device
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK to install
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
