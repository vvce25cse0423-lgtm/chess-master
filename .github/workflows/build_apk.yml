name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. Set up Java 17
      # ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ─────────────────────────────────────────
      # 3. Set up Flutter
      # ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # ─────────────────────────────────────────
      # 4. Write local.properties
      #    (tells Gradle where Flutter SDK lives)
      # ─────────────────────────────────────────
      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"  >> android/local.properties
          echo "flutter.buildMode=release"   >> android/local.properties
          echo "flutter.versionName=1.0.0"   >> android/local.properties
          echo "flutter.versionCode=1"        >> android/local.properties
          cat android/local.properties

      # ─────────────────────────────────────────
      # 5. Install dependencies
      # ─────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ─────────────────────────────────────────
      # 6. Run tests
      # ─────────────────────────────────────────
      - name: Run tests
        run: flutter test --no-pub
        continue-on-error: true

      # ─────────────────────────────────────────
      # 7. Analyze code
      # ─────────────────────────────────────────
      - name: Analyze code
        run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings

      # ─────────────────────────────────────────
      # 8. Build APK (release universal)
      # ─────────────────────────────────────────
      - name: Build APK (release)
        run: flutter build apk --release --no-pub

      # ─────────────────────────────────────────
      # 9. Build split APKs (per ABI)
      # ─────────────────────────────────────────
      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release --no-pub

      # ─────────────────────────────────────────
      # 10. Collect & rename APKs
      # ─────────────────────────────────────────
      - name: Collect APKs
        run: |
          mkdir -p output
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)

          cp build/app/outputs/flutter-apk/app-release.apk \
             output/ChessMaster_${TIMESTAMP}_universal.apk

          for ABI in arm64-v8a armeabi-v7a x86_64; do
            FILE="build/app/outputs/flutter-apk/app-${ABI}-release.apk"
            if [ -f "$FILE" ]; then
              SHORT=$(echo $ABI | tr '-' '_')
              cp "$FILE" "output/ChessMaster_${TIMESTAMP}_${SHORT}.apk"
            fi
          done

          echo "=== Built APKs ==="
          ls -lh output/

      # ─────────────────────────────────────────
      # 11. Upload artifacts
      # ─────────────────────────────────────────
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChessMaster-APKs
          path: output/*.apk
          retention-days: 30

      # ─────────────────────────────────────────
      # 12. Create GitHub Release (on push to main)
      # ─────────────────────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chess Master v${{ github.run_number }}
          body: |
            ## ♟ Chess Master — Auto Build

            Built from commit: `${{ github.sha }}`

            ### 📱 Download
            | File | Target |
            |------|--------|
            | `*_universal.apk` | All devices |
            | `*_arm64_v8a.apk` | Modern phones (recommended) |
            | `*_armeabi_v7a.apk` | Older phones |
            | `*_x86_64.apk` | Emulators |

            ### Install
            Enable **"Install unknown apps"** in Android Settings, then open the APK.
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
