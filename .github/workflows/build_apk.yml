name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # CRITICAL: must run before any Gradle step
      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT"            >  android/local.properties
          echo "sdk.dir=/usr/local/lib/android/sdk"   >> android/local.properties
          echo "flutter.versionCode=1"                >> android/local.properties
          echo "flutter.versionName=1.0.0"            >> android/local.properties
          cat android/local.properties

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze (non-fatal)
        run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Test (non-fatal)
        run: flutter test --no-pub
        continue-on-error: true

      - name: Build APK (universal release)
        run: flutter build apk --release --no-pub

      - name: Build APK (split per ABI)
        run: flutter build apk --split-per-abi --release --no-pub

      - name: Collect APKs
        run: |
          mkdir -p output
          TS=$(date +%Y%m%d_%H%M%S)
          cp build/app/outputs/flutter-apk/app-release.apk \
             output/ChessMaster_${TS}_universal.apk
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            SRC="build/app/outputs/flutter-apk/app-${ABI}-release.apk"
            if [ -f "$SRC" ]; then
              LABEL=$(echo $ABI | tr '-' '_')
              cp "$SRC" "output/ChessMaster_${TS}_${LABEL}.apk"
            fi
          done
          echo "=== APKs built ==="
          ls -lh output/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ChessMaster-APKs
          path: output/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Chess Master v${{ github.run_number }}
          body: |
            ## ♟ Chess Master — Build v${{ github.run_number }}
            Commit: `${{ github.sha }}`

            | APK | Device |
            |-----|--------|
            | `*_universal.apk` | All devices |
            | `*_arm64_v8a.apk` | Modern phones ✅ |
            | `*_armeabi_v7a.apk` | Older phones |
            | `*_x86_64.apk` | Emulators |
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
