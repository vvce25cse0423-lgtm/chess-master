name: chess_master
description: A beautiful full-featured chess application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  animate_do: ^3.3.4
  lottie: ^3.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
